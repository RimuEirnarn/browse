<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUNAERI System</title>
  <link rel="stylesheet" href="css/colors.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/commands.css">
  <link rel="stylesheet" href="css/widgets.css">
  <link rel="stylesheet" href="css/toasts.css">
  <link rel="stylesheet" href="css/modals.css">
  <script type="module" src="js/main.mjs" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Chewy&family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap"
    rel="stylesheet">

</head>

<body>
  <div class="bootloader w-fixed w-100dv h-100dv h-fixed absolute">
    <div class="bottom left absolute">
      <div class="boot-syslog"></div>
      <div class="loader-info">0%</div>
      <div class="progress w-100 w-fixed">
        <div></div>
      </div>
    </div>
  </div>
  <div class="d-flex flex-wrap">
    <div class="w-10dv w-fixed h-100dv h-fixed">
      <div class="lunae-version-block">
        <div class="lunae-version-info">LOADING</div>
        <div class="lunae-rimu-info">LOADING</div>
        <div class="sp w-100">
          <div class="aws"></div>
          <div class="hpy"></div>
          <div class="nr"></div>
          <div class="bd"></div>
          <div class="awf"></div>
        </div>
      </div>
      <div class="lunae-fsyslog">
        <div class="version"></div>
        <div>LUNAERI[System]</div>
        <div class="text-primary">DESKTOP MODE</div>
        <div class="system-runtime"></div>
        <div class="helpline">Command::CTRL+K</div>
      </div>
    </div>
    <div class="w-90dv w-fixed h-100dv h-fixed endfield">
      <div class="overlay" id="palette">
        <div class="hud-corner"><span class="version"></span> &nbsp; <span>LUNAERI[System]</span> &nbsp; DESKTOP MODE
        </div>

        <div class="search-wrap" id="searchWrap">
          <i class="nf nf-oct-terminal" aria-hidden="true"></i>
          <div class="input-ghost-wrap">
            <span id="ghost" class="ghost-text" aria-hidden="true"></span>
            <input type="text" id="palette_input" placeholder="search, navigate, or run a command..." autocomplete="off"
              spellcheck="false" />
          </div>
          <span class="mode-tag" id="mode">omni</span>
        </div>

        <div class="hint-row">
          <span><kbd>↑↓</kbd> navigate</span>
          <span><kbd>enter</kbd> open</span>
          <span><kbd>tab</kbd> complete</span>
          <span><kbd>esc</kbd> dismiss</span>
          <span><kbd>ctrl+k</kbd> open palette</span>
        </div>

        <div class="section-label" id="section_label">quick prefixes</div>
        <div class="prefix-tip" id="prefix_tips">
          <span class="prefix-chip" data-cid="/"><b>/</b> command</span>
          <span class="prefix-chip" data-cid="@"><b>@</b> bookmark</span>
          <span class="prefix-chip" data-cid="#"><b>#</b> history</span>
          <span class="prefix-chip" data-cid="?"><b>?</b> ai search</span>
          <span class="prefix-chip" data-cid=">"><b>></b> eval</span>
        </div>

        <div class="results" id="results">
        </div>

        <div class="divider"></div>

        <div class="bottom-bar">
          <span class="status" id="palette_status"></span>
          <div class="actions">
          </div>
        </div>
      </div>
      <!-- <div id="anchor-top-left" class="hud-anchor top-left"></div> -->
      <div id="anchor-top-right" class="hud-anchor top-right"></div>
      <!-- <div id="anchor-bottom-left" class="hud-anchor bottom-left"></div> -->
      <div id="anchor-bottom-right" class="hud-anchor bottom-right"></div>
    </div>
  </div>
  <div id="toast-zone" class="toast-zone"></div>
</body>

</html>
